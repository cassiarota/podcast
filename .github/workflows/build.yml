# 随身听 — cross-platform packaged builds
#
# Triggers:
#   - push to master / main → build both, update the stable "latest" release,
#                              and overwrite the fixed download files on the VPS
#   - push tag v*           → build both and create a versioned GitHub Release
#   - manual (workflow_dispatch) → same as push
#
# Kokoro model is downloaded from Hugging Face (not Git LFS) to avoid
# burning the repo's monthly LFS bandwidth on CI builds. The repo's
# LFS-tracked copy is still the source of truth for developer clones.

name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            bundle_dir: aarch64-apple-darwin/release/bundle/dmg
            ext: dmg
            artifact_name: SuiShenTing-macos-arm64.dmg
          - os: windows-2022
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bundle_dir: x86_64-pc-windows-msvc/release/bundle/msi
            ext: msi
            artifact_name: SuiShenTing-windows-x64.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We pull LFS in a separate cached step below — saves the
          # repo's LFS bandwidth on builds that don't touch the model.
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the Kokoro model directory keyed by the LFS pointer hash
      # so we only pay LFS bandwidth when the actual model file changes.
      - name: Cache Kokoro model
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: models/Kokoro-82M
          key: kokoro-82m-lfs-${{ hashFiles('models/Kokoro-82M/.gitattributes', '.github/kokoro-cache-bust.txt') }}

      - name: Install Git LFS and pull Kokoro
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # macOS already has git-lfs; Windows runners need an explicit install.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            choco install git-lfs -y --no-progress || true
          fi
          git lfs install
          git lfs pull --include="models/Kokoro-82M/**"

      - name: Verify model exists
        shell: bash
        run: |
          ls -lh models/Kokoro-82M/kokoro-v1_0.pth
          size=$(wc -c < models/Kokoro-82M/kokoro-v1_0.pth)
          if [ "$size" -lt 1000000 ]; then
            echo "Kokoro model is suspiciously small ($size bytes) — LFS pull failed."
            exit 1
          fi

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-${{ matrix.label }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.label }}-

      - name: Install JS deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: desktop
        env:
          # Ad-hoc sign macOS builds because no Apple Developer ID is
          # configured. Gatekeeper may still warn on first launch.
          APPLE_SIGNING_IDENTITY: '-'
          TAURI_SKIP_SIDECAR_SIGNATURE_CHECK: '1'
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.ext }}

      - name: Stage artifact with ASCII name
        id: stage
        shell: bash
        run: |
          src=$(find desktop/src-tauri/target/${{ matrix.bundle_dir }} -name "*.${{ matrix.ext }}" | head -1)
          if [ -z "$src" ]; then
            echo "No .${{ matrix.ext }} produced under ${{ matrix.bundle_dir }}"
            ls -laR desktop/src-tauri/target/${{ matrix.target }}/release/bundle/ || true
            exit 1
          fi
          mkdir -p _dist
          cp "$src" "_dist/${{ matrix.artifact_name }}"
          ls -lh _dist
          echo "path=_dist/${{ matrix.artifact_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.stage.outputs.path }}
          retention-days: 90

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name "*.dmg" -o -name "*.msi" \) -exec cp {} release/ \;
          ls -lh release

      - name: Publish / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest successful build' }}
          files: release/*
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          body: ${{ !startsWith(github.ref, 'refs/tags/v') && format('Automated desktop build from commit {0}.', github.sha) || '' }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true

  deploy-vps:
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download packaged applications
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten fixed-name downloads
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name 'SuiShenTing-windows-x64.msi' -exec cp {} release/ \;
          find dist -type f -name 'SuiShenTing-macos-arm64.dmg' -exec cp {} release/ \;
          test -s release/SuiShenTing-windows-x64.msi
          test -s release/SuiShenTing-macos-arm64.dmg
          sha256sum release/* > release/SHA256SUMS.txt

      - name: Render portal page with live build metadata
        shell: bash
        run: |
          set -euo pipefail
          build_date=$(date -u '+%Y-%m-%d %H:%M UTC')
          commit="${GITHUB_SHA::7}"
          win_size=$(du -h release/SuiShenTing-windows-x64.msi | cut -f1)
          mac_size=$(du -h release/SuiShenTing-macos-arm64.dmg | cut -f1)
          python3 - "$build_date" "$commit" "$win_size" "$mac_size" <<'PY'
          import html, json, sys
          build_date, commit, win_size, mac_size = sys.argv[1:5]
          version = json.load(open("desktop/src-tauri/tauri.conf.json"))["version"]
          sums = open("release/SHA256SUMS.txt").read().replace(" release/", " ")
          tmpl = open("desktop/portal/index.html.tmpl", encoding="utf-8").read()
          out = (tmpl
                 .replace("__VERSION__", html.escape(version))
                 .replace("__BUILD_DATE__", html.escape(build_date))
                 .replace("__COMMIT__", html.escape(commit))
                 .replace("__WIN_SIZE__", html.escape(win_size))
                 .replace("__MAC_SIZE__", html.escape(mac_size))
                 .replace("__SHA256SUMS__", html.escape(sums.strip())))
          open("release_portal.html", "w", encoding="utf-8").write(out)
          PY
          test -s release_portal.html

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: 84.247.139.85
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Publish stable files to VPS
        env:
          DEPLOY_HOST: 84.247.139.85
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_USER"
          destination="/opt/cassian/site/downloads/podcast"
          portal="/opt/cassian/site/podcast/index.html"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$destination' '$(dirname "$portal")'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" release/ "$DEPLOY_USER@$DEPLOY_HOST:$destination/"
          # Refresh the product/download page so it shows the latest version,
          # build date and checksums. The fixed download links never change.
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" release_portal.html "$DEPLOY_USER@$DEPLOY_HOST:$portal"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -s '$destination/SuiShenTing-windows-x64.msi' && test -s '$destination/SuiShenTing-macos-arm64.dmg' && test -s '$portal'"

      - name: Verify public downloads
        env:
          DEPLOY_HOST: 84.247.139.85
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          # Verify through the origin because Cloudflare may challenge
          # GitHub-hosted runner IPs even when the files are healthy.
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "curl -fsSI http://127.0.0.1/downloads/podcast/SuiShenTing-windows-x64.msi >/dev/null && \
             curl -fsSI http://127.0.0.1/downloads/podcast/SuiShenTing-macos-arm64.dmg >/dev/null && \
             curl -fsS  http://127.0.0.1/podcast/ | grep -q 'SuiShenTing-windows-x64.msi'"
